name: Build Skills Index

on:
  push:
    paths:
      - 'skills/**/*.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build skills-index.json
        run: node scripts/build-index.js

      - name: Commit updated index
        run: |
          git config user.email "bot@rbuild.ai"
          git config user.name "Skills Bot"
          git add skills-index.json
          git diff --staged --quiet || git commit -m "chore: rebuild skills index [skip ci]"
          git push
